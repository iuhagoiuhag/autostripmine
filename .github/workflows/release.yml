name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Resolve version (skip existing tags)
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          IFS='.' read -r major minor patch <<< "$current"
          version="$current"

          while gh release view "v$version" >/dev/null 2>&1; do
            patch=$((patch + 1))
            version="$major.$minor.$patch"
          done

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build with Gradle
        run: ./gradlew build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            ./build/libs/*.jar

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^mod_version=.*/mod_version=$VERSION/" gradle.properties

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gradle.properties
          git commit -m "Bump version to $VERSION [skip ci]"
          git push

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_PAT }}
          project: "ktM6wXUv"
          version: "v${{ steps.version.outputs.version }}"
          files: ./build/libs/autostripmine-${{ steps.version.outputs.version }}.jar
          loaders: '["fabric"]'
          game-versions: '["26.2", "26.1.2"]'
