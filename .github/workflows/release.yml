name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Read current version
        id: version
        run: |
          current=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          echo "current=$current" >> "$GITHUB_OUTPUT"

      - name: Build with Gradle
        run: ./gradlew build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            ./build/libs/*.jar

      - name: Increment and commit version bump
        run: |
          current="${{ steps.version.outputs.current }}"
          IFS='.' read -r major minor patch <<< "$current"
          new_version="$major.$minor.$((patch + 1))"

          sed -i "s/^mod_version=.*/mod_version=$new_version/" gradle.properties

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gradle.properties
          git commit -m "Bump version to $new_version [skip ci]"
          git push

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_PAT }}
          project-id: "ktM6wXUv"
          version: "v${{ steps.version.outputs.current }}"
          files: ./build/libs/*.jar
          loaders: |
            fabric
          game-versions: |
            26.2
            26.1.2
